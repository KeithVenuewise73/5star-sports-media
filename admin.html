<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | 5-Star Sports Media</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:#D4AF37; --black:#0A0A0A; --dark-card:#1A1A1A;
      --dark-border:#2A2A2A; --gray:#888; --gray-light:#BBB;
      --white:#FFF; --off-white:#F5F5F5; --radius:4px;
    }
    body {
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--black); color:var(--white);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:20px;
    }

    /* LOGIN */
    #login-screen { width:100%; max-width:380px; }
    .login-box {
      background:var(--dark-card); border:1px solid var(--dark-border);
      border-radius:var(--radius); padding:36px 30px; text-align:center;
    }
    .login-logo {
      font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.04em;
      color:var(--white); margin-bottom:4px; font-weight:700;
    }
    .login-logo span { color:var(--gold); }
    .login-sub {
      font-size:0.72rem; text-transform:uppercase; letter-spacing:0.14em;
      color:var(--gray); margin-bottom:26px;
    }
    .login-field { margin-bottom:14px; text-align:left; }
    .login-label {
      display:block; font-size:0.66rem; text-transform:uppercase;
      letter-spacing:0.08em; color:var(--gray-light); margin-bottom:6px;
    }
    .login-input {
      width:100%; padding:11px 13px; font-size:0.92rem;
      background:rgba(255,255,255,0.05); border:1px solid var(--dark-border);
      border-radius:var(--radius); color:var(--white); outline:none;
      transition:border-color 0.2s; font-family:inherit;
    }
    .login-input:focus { border-color:var(--gold); }
    .login-btn {
      width:100%; margin-top:8px; padding:12px;
      background:var(--gold); color:var(--black); border:none;
      border-radius:var(--radius); font-size:0.86rem; font-weight:700;
      text-transform:uppercase; letter-spacing:0.06em; cursor:pointer;
      font-family:inherit; transition:filter 0.2s;
    }
    .login-btn:hover { filter:brightness(1.08); }
    .login-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .login-error {
      display:none; margin-top:14px; font-size:0.8rem; color:#FF6B6B;
      background:rgba(255,107,107,0.08); border:1px solid rgba(255,107,107,0.25);
      border-radius:var(--radius); padding:9px;
    }

    /* DASHBOARD (placeholder for now) */
    #dashboard { display:none; width:100%; max-width:680px; text-align:center; }
    .dash-card {
      background:var(--dark-card); border:1px solid var(--dark-border);
      border-radius:var(--radius); padding:40px 30px;
    }
    .dash-logo {
      font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.04em;
      color:var(--white); margin-bottom:4px; font-weight:700;
    }
    .dash-logo span { color:var(--gold); }
    .dash-ok {
      font-size:1.1rem; color:var(--gold); margin:20px 0 8px; font-weight:600;
    }
    .dash-email { font-size:0.85rem; color:var(--gray-light); margin-bottom:6px; }
    .dash-note { font-size:0.78rem; color:var(--gray); margin-bottom:26px; line-height:1.5; }
    .logout-btn {
      padding:10px 22px; background:transparent; color:var(--gray-light);
      border:1px solid var(--dark-border); border-radius:var(--radius);
      font-size:0.78rem; font-weight:600; text-transform:uppercase;
      letter-spacing:0.06em; cursor:pointer; font-family:inherit;
      transition:all 0.2s;
    }
    .logout-btn:hover { border-color:var(--gold); color:var(--gold); }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">5<span>★</span>STAR</div>
      <div class="login-sub">Admin Access</div>

      <div class="login-field">
        <label class="login-label" for="email">Email</label>
        <input class="login-input" type="email" id="email" autocomplete="username" placeholder="you@example.com" />
      </div>
      <div class="login-field">
        <label class="login-label" for="password">Password</label>
        <input class="login-input" type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- DASHBOARD (placeholder — real content comes next phase) -->
  <div id="dashboard">
    <div class="dash-card">
      <div class="dash-logo">5<span>★</span>STAR</div>
      <div class="dash-ok">✅ Authenticated</div>
      <div class="dash-email" id="whoami">—</div>
      <div class="dash-note">
        Login is working. The analytics dashboard and athlete spotlight queue<br>
        will be added here next, behind this same secure login.
      </div>
      <button class="logout-btn" onclick="doLogout()">Log Out</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://urwnbskrtoplgnkkxuvl.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyd25ic2tydG9wbGdua2t4dXZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDgyMjMsImV4cCI6MjA5NDYyNDIyM30._BpvQsf6Ub5nwxY8jD3aGDLvyk0-_vBA4s6LREZ9ShQ';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const loginScreen = document.getElementById('login-screen');
    const dashboard   = document.getElementById('dashboard');
    const errEl       = document.getElementById('loginError');

    function showError(msg) {
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }
    function clearError() { errEl.style.display = 'none'; }

    function showDashboard(user) {
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      document.getElementById('whoami').textContent = 'Signed in as ' + (user && user.email ? user.email : 'admin');
    }
    function showLogin() {
      dashboard.style.display = 'none';
      loginScreen.style.display = 'block';
    }

    async function doLogin() {
      clearError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Enter your email and password.'); return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email: email, password: password });
        if (error) { showError(error.message || 'Login failed.'); return; }
        showDashboard(data.user);
      } catch (e) {
        showError('Something went wrong. Try again.');
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function doLogout() {
      await sb.auth.signOut();
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
      showLogin();
    }

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keydown', function(e){
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email').addEventListener('keydown', function(e){
      if (e.key === 'Enter') document.getElementById('password').focus();
    });

    // On load: if already logged in (existing session), go straight to dashboard
    (async function init() {
      try {
        const { data } = await sb.auth.getSession();
        if (data && data.session && data.session.user) {
          showDashboard(data.session.user);
        }
      } catch (e) { /* not logged in — stay on login */ }
    })();
  </script>
</body>
</html>
