<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Athlete — 5-Star Sports Media</title>
<meta name="description" content="Athlete player card on 5-Star Sports Media." />
<meta property="og:title" content="Athlete — 5-Star Sports Media" />
<meta property="og:type" content="profile" />
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="shared/shared.css">
<style>
  /* Player-card styles — prefixed pc- so they never collide with the site stylesheet.
     Colors/fonts come from the shared 5-Star tokens. */
  .pc-wrap{max-width:780px;margin:0 auto;padding:2.5rem 1.25rem 1rem}
  .pc-back{display:inline-block;font-family:var(--font-headline);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:1.5rem;transition:color .2s}
  .pc-back:hover{color:var(--gold)}
  .pc-skel{color:var(--gray);font-family:var(--font-headline);letter-spacing:.12em;text-transform:uppercase;font-size:.72rem;padding:4rem 0;text-align:center}

  .pc-state{text-align:center;padding:3.5rem 1.25rem;display:flex;flex-direction:column;align-items:center;gap:.75rem}
  .pc-state .pc-eyebrow{font-family:var(--font-headline);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
  .pc-state h2{font-family:var(--font-display);font-size:2rem;letter-spacing:.02em;color:var(--white)}
  .pc-state p{color:var(--gray-light);max-width:420px;font-size:.95rem;line-height:1.7}
  .pc-cta{margin-top:1rem;font-family:var(--font-headline);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--black);background:var(--gold);padding:.75rem 1.5rem;border-radius:4px}

  .pc-hero{display:grid;grid-template-columns:200px 1fr;gap:1.75rem;align-items:end}
  @media(max-width:560px){.pc-hero{grid-template-columns:1fr;gap:1.25rem}}
  .pc-photo{aspect-ratio:4/5;border-radius:8px;overflow:hidden;border:1px solid var(--dark-border);background:var(--dark-card);max-width:200px}
  .pc-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .pc-monogram{width:100%;height:100%;min-height:230px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:4.5rem;color:var(--gold-dark);background:linear-gradient(160deg,#191919,#0e0e0e)}
  .pc-sportline{font-family:var(--font-headline);font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
  .pc-name{font-family:var(--font-display);font-size:3.6rem;line-height:.92;letter-spacing:.01em;color:var(--white)}
  @media(max-width:560px){.pc-name{font-size:2.8rem}}
  .pc-meta{margin-top:.6rem;color:var(--gray-light);font-size:.9rem}
  .pc-meta b{color:var(--white);font-weight:600}

  .pc-strip{display:flex;flex-wrap:wrap;gap:0;margin:1.75rem 0 0;border:1px solid var(--dark-border);border-radius:8px;overflow:hidden}
  .pc-strip .pc-cell{flex:1 1 25%;min-width:90px;padding:.85rem 1rem;border-right:1px solid var(--dark-border);border-bottom:1px solid var(--dark-border)}
  .pc-strip .pc-cell:last-child{border-right:none}
  .pc-k{font-family:var(--font-headline);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gray)}
  .pc-v{font-family:var(--font-display);font-size:1.5rem;color:var(--gold);line-height:1.1;margin-top:.15rem}

  .pc-block{margin-top:2.25rem}
  .pc-block-title{font-family:var(--font-headline);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--white);padding-bottom:.6rem;border-bottom:1px solid var(--dark-border);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
  .pc-star{color:var(--gold);font-size:.7rem}

  .pc-tags{display:flex;flex-wrap:wrap;gap:.5rem}
  .pc-tag{font-family:var(--font-headline);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-light);border:1px solid var(--dark-border);border-radius:999px;padding:.4rem .85rem;cursor:pointer;background:transparent;transition:all .15s}
  .pc-tag:hover{border-color:var(--gold);color:var(--white)}
  .pc-tag.active{color:var(--black);background:var(--gold);border-color:var(--gold)}
  .pc-hint{font-size:.74rem;color:var(--gray);margin:-.3rem 0 .85rem}
  .pc-teams-empty{color:var(--gray);font-size:.85rem;padding:.4rem 0}

  .pc-teams{display:grid;gap:.65rem}
  .pc-team{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:8px;padding:.9rem 1.1rem}
  .pc-tsport{font-family:var(--font-headline);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
  .pc-tname{font-family:var(--font-headline);font-weight:600;font-size:1rem;color:var(--white);margin-top:.1rem}
  .pc-tsub{font-size:.84rem;color:var(--gray-light);margin-top:.15rem}

  .pc-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.65rem}
  .pc-stat{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:8px;padding:.85rem 1rem;text-align:center}
  .pc-sv{font-family:var(--font-display);font-size:1.9rem;color:var(--gold);line-height:1}
  .pc-sk{font-family:var(--font-headline);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-light);margin-top:.3rem}
  .pc-sseason{font-size:.66rem;color:var(--gray);margin-top:.1rem}

  .pc-verified{display:inline-flex;align-items:center;gap:.45rem;margin-top:2rem;font-size:.74rem;color:var(--gray);font-family:var(--font-headline);letter-spacing:.06em}
  .pc-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
</style>
</head>
<body>
<div id="site-header"></div>

<section class="section">
  <div class="pc-wrap">
    <a class="pc-back" href="players.html">← All Athletes</a>
    <div id="root"><div class="pc-skel">Loading athlete…</div></div>
  </div>
</section>

<div id="sponsor-banner"></div>
<div id="site-footer"></div>

<script src="shared/config.js"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/auth.js"></script>
<script src="shared/lead-capture.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/analytics.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/loaders.js"></script>
<script src="assets/js/main.js"></script>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
  const SUPABASE_URL = "https://urwnbskrtoplgnkkxuvl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_NnATRFU2t1ATOHR07mFLoQ_ptkdjGDT";
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  const root = document.getElementById("root");

  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));

  function htWt(inches, lbs){
    const parts = [];
    if (inches){ const f = Math.floor(inches/12), i = Math.round(inches%12); parts.push(`${f}'${i}"`); }
    if (lbs) parts.push(`${Math.round(lbs)} lb`);
    return parts;
  }

  function privateState(){
    root.innerHTML = `
      <div class="pc-state">
        <div class="pc-eyebrow">★ 5-Star Sports Media</div>
        <h2>This profile is private</h2>
        <p>This athlete's profile isn't public, or the link is no longer active. Families control their own visibility — only the parent can make a profile public.</p>
        <a class="pc-cta" href="players.html">Browse public athletes</a>
      </div>`;
    document.title = "Profile unavailable — 5-Star Sports Media";
  }

  window.__filterSport = (f, btn) => {
    document.querySelectorAll("#sportChips .pc-tag").forEach(t => t.classList.remove("active"));
    if (btn) btn.classList.add("active");
    let shown = 0;
    document.querySelectorAll("#teamsWrap .pc-team").forEach(c => {
      const match = (f === "__all") || (c.getAttribute("data-sport") === f);
      c.style.display = match ? "" : "none";
      if (match) shown++;
    });
    const empty = document.getElementById("teamsEmpty");
    if (empty) empty.style.display = shown ? "none" : "block";
  };

  function render(a){
    const name = `${a.first_name || ""} ${a.last_name || ""}`.trim() || "Athlete";
    const initials = ((a.first_name||" ")[0] + (a.last_name||" ")[0]).toUpperCase();
    document.title = `${name} — 5-Star Sports Media`;

    const photo = a.profile_photo_url
      ? `<img src="${esc(a.profile_photo_url)}" alt="${esc(name)}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML='<div class=&quot;pc-monogram&quot;>${esc(initials)}</div>'">`
      : `<div class="pc-monogram">${esc(initials)}</div>`;

    const loc = [a.city, a.state].filter(Boolean).join(", ");
    const metaBits = [];
    if (a.school) metaBits.push(`<b>${esc(a.school)}</b>`);
    if (loc) metaBits.push(esc(loc));

    const cells = [];
    if (a.graduation_year) cells.push(["Class of", `'${String(a.graduation_year).slice(-2)}`]);
    const hw = htWt(a.height_inches, a.weight_lbs);
    if (hw[0]) cells.push(["Height", hw[0]]);
    if (hw[1]) cells.push(["Weight", hw[1]]);
    if (a.dominant_hand) cells.push(["Throws / Shoots", `${a.dominant_hand[0].toUpperCase()}${a.dominant_hand.slice(1)}`]);
    if (a.dominant_foot) cells.push(["Foot", `${a.dominant_foot[0].toUpperCase()}${a.dominant_foot.slice(1)}`]);
    const strip = cells.length ? `<div class="pc-strip">${cells.map(c=>
      `<div class="pc-cell"><div class="pc-k">${esc(c[0])}</div><div class="pc-v">${esc(c[1])}</div></div>`).join("")}</div>` : "";

    const teamEntries = (a.sports || []).filter(s => s.sport || s.current_team || s.position);
    const chipSet = [];
    const pushChip = (n) => { if (n && !chipSet.some(x => x.toLowerCase() === n.toLowerCase())) chipSet.push(n); };
    if (a.primary_sport) pushChip(a.primary_sport);
    (a.secondary_sports || []).forEach(pushChip);
    teamEntries.forEach(s => pushChip(s.sport));

    let sportsBlock = "";
    if (chipSet.length || teamEntries.length) {
      const chips = `<button class="pc-tag active" onclick="window.__filterSport('__all',this)">All</button>` +
        chipSet.map(n => `<button class="pc-tag" onclick="window.__filterSport('${esc(n.toLowerCase())}',this)">${esc(n)}</button>`).join("");
      const teamCards = teamEntries.map(s => {
        const sub = [s.position, s.organization, s.season].filter(Boolean).map(esc).join(" · ");
        return `<div class="pc-team" data-sport="${esc((s.sport || "").toLowerCase())}">
          ${s.sport ? `<div class="pc-tsport">${esc(s.sport)}</div>` : ""}
          <div class="pc-tname">${esc(s.current_team || s.position || s.sport || "Team")}</div>
          ${sub ? `<div class="pc-tsub">${sub}</div>` : ""}
        </div>`;
      }).join("");
      const teamsWrap = teamEntries.length
        ? `<div class="pc-teams" id="teamsWrap">${teamCards}</div><div class="pc-teams-empty" id="teamsEmpty" style="display:none">No teams listed for this sport yet.</div>`
        : `<div class="pc-teams-empty">No teams added yet.</div>`;
      sportsBlock = `<section class="pc-block"><div class="pc-block-title"><span class="pc-star">★</span> Sports &amp; Teams</div>
        <div class="pc-hint">Tap a sport to see those teams &amp; positions.</div>
        <div class="pc-tags" id="sportChips">${chips}</div>
        ${teamsWrap}</section>`;
    }

    const stats = (a.stats || []).filter(s => s.stat_name);
    const statsHtml = stats.length ? `<section class="pc-block"><div class="pc-block-title"><span class="pc-star">★</span> Stats</div>
      <div class="pc-stats">${stats.map(s=>`<div class="pc-stat">
        <div class="pc-sv">${esc(s.stat_value ?? "—")}</div>
        <div class="pc-sk">${esc(s.stat_name)}</div>
        ${s.season?`<div class="pc-sseason">${esc(s.season)}</div>`:""}
      </div>`).join("")}</div></section>` : "";

    root.innerHTML = `
      <div class="pc-hero">
        <div class="pc-photo">${photo}</div>
        <div>
          ${a.primary_sport?`<div class="pc-sportline">${esc(a.primary_sport)}</div>`:""}
          <h1 class="pc-name">${esc(name)}</h1>
          ${metaBits.length?`<div class="pc-meta">${metaBits.join(" · ")}</div>`:""}
        </div>
      </div>
      ${strip}
      ${sportsBlock}
      ${statsHtml}
      <div class="pc-verified"><span class="pc-dot"></span> Verified family profile · Powered by AthleteHuddle</div>`;
  }

  (async () => {
    const id = new URLSearchParams(location.search).get("id");
    if (!id){ privateState(); return; }
    try {
      const { data, error } = await sb.rpc("public_athlete_card", { p_athlete_id: id });
      if (error) throw error;
      if (!data){ privateState(); return; }
      render(data);
    } catch (e){
      privateState();
    }
  })();
</script>
</body>
</html>
