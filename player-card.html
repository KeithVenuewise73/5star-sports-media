<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Athlete — 5-Star Sports Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#D4AF37; --gold-light:#F2D26B; --gold-dark:#A8891F;
    --black:#0A0A0A; --dark:#111111; --dark-card:#1A1A1A; --dark-border:#2A2A2A;
    --gray:#888888; --gray-light:#CCCCCC; --white:#FFFFFF;
    --display:'Bebas Neue','Arial Black',sans-serif;
    --head:'Oswald',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--black);color:var(--white);font-family:var(--body);line-height:1.6;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:760px;margin:0 auto;padding:0 1.25rem}

  /* top bar */
  .topbar{border-bottom:1px solid var(--dark-border);padding:1rem 0;position:sticky;top:0;background:rgba(10,10,10,.92);backdrop-filter:blur(8px);z-index:10}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between}
  .brand{font-family:var(--display);font-size:1.5rem;letter-spacing:.04em;color:var(--white)}
  .brand .star{color:var(--gold)}
  .back{font-family:var(--head);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);transition:color .2s}
  .back:hover{color:var(--gold)}

  /* states */
  .state{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 1.25rem;gap:.75rem}
  .state .eyebrow{font-family:var(--head);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
  .state h2{font-family:var(--display);font-size:2rem;letter-spacing:.02em;color:var(--white)}
  .state p{color:var(--gray-light);max-width:420px;font-size:.95rem}
  .state .cta{margin-top:1rem;font-family:var(--head);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--black);background:var(--gold);padding:.75rem 1.5rem;border-radius:4px}

  /* card */
  .card{padding:2rem 0 1rem}
  .hero{display:grid;grid-template-columns:200px 1fr;gap:1.75rem;align-items:end}
  @media(max-width:560px){.hero{grid-template-columns:1fr;gap:1.25rem}}
  .photo{aspect-ratio:4/5;border-radius:8px;overflow:hidden;border:1px solid var(--dark-border);background:var(--dark-card);position:relative}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .monogram{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:4.5rem;color:var(--gold-dark);background:linear-gradient(160deg,#191919,#0e0e0e)}
  @media(max-width:560px){.photo{max-width:200px}}
  .heading .sportline{font-family:var(--head);font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
  .name{font-family:var(--display);font-size:3.6rem;line-height:.92;letter-spacing:.01em}
  @media(max-width:560px){.name{font-size:2.8rem}}
  .meta{margin-top:.6rem;color:var(--gray-light);font-size:.9rem}
  .meta b{color:var(--white);font-weight:600}

  /* stat strip */
  .strip{display:flex;flex-wrap:wrap;gap:0;margin:1.75rem 0 0;border:1px solid var(--dark-border);border-radius:8px;overflow:hidden}
  .strip .cell{flex:1 1 25%;min-width:90px;padding:.85rem 1rem;border-right:1px solid var(--dark-border);border-bottom:1px solid var(--dark-border)}
  .strip .cell:last-child{border-right:none}
  .strip .k{font-family:var(--head);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gray)}
  .strip .v{font-family:var(--display);font-size:1.5rem;color:var(--gold);line-height:1.1;margin-top:.15rem}

  section.block{margin-top:2.25rem}
  .block-title{font-family:var(--head);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--white);padding-bottom:.6rem;border-bottom:1px solid var(--dark-border);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
  .block-title .star{color:var(--gold);font-size:.7rem}

  .teams{display:grid;gap:.65rem}
  .team{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:8px;padding:.9rem 1.1rem}
  .team .t-sport{font-family:var(--head);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
  .team .t-name{font-family:var(--head);font-weight:600;font-size:1rem;color:var(--white);margin-top:.1rem}
  .team .t-sub{font-size:.84rem;color:var(--gray-light);margin-top:.15rem}

  .tags{display:flex;flex-wrap:wrap;gap:.5rem}
  .tag{font-family:var(--head);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-light);border:1px solid var(--dark-border);border-radius:999px;padding:.35rem .8rem}
  .tag.primary{color:var(--black);background:var(--gold);border-color:var(--gold)}

  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.65rem}
  .stat{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:8px;padding:.85rem 1rem;text-align:center}
  .stat .s-v{font-family:var(--display);font-size:1.9rem;color:var(--gold);line-height:1}
  .stat .s-k{font-family:var(--head);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-light);margin-top:.3rem}
  .stat .s-season{font-size:.66rem;color:var(--gray);margin-top:.1rem}

  .verified{display:inline-flex;align-items:center;gap:.45rem;margin-top:2rem;font-size:.74rem;color:var(--gray);font-family:var(--head);letter-spacing:.06em}
  .verified .dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}

  /* footer ecosystem bar */
  .eco{background:#0A0A0A;border-top:1px solid var(--dark-border);padding:.85rem 0;margin-top:3rem}
  .eco .wrap{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
  .eco span{font-size:.7rem;color:#666;font-family:var(--body)}
  .eco a{font-size:.68rem;color:#777;padding:.2rem .5rem;font-family:var(--body)}
  .eco a:hover{color:var(--gold)}
  .skel{color:var(--gray);font-family:var(--head);letter-spacing:.12em;text-transform:uppercase;font-size:.72rem;padding:4rem 0;text-align:center}
</style>
</head>
<body>
  <div class="topbar">
    <div class="wrap">
      <a class="brand" href="https://5starsportsmedia.com"><span class="star">★</span> 5-STAR</a>
      <a class="back" href="players.html">← All Athletes</a>
    </div>
  </div>

  <div class="wrap">
    <div id="root">
      <div class="skel">Loading athlete…</div>
    </div>
  </div>

  <div class="eco">
    <div class="wrap">
      <span>★ <strong style="color:var(--gold)">Venuewise Ecosystem</strong> — youth sports, connected</span>
      <div>
        <a href="https://venuewise.net/homehuddle/">HomeHuddle</a>
        <a href="https://venuewise.net/homehuddle/family-athletes.html">AthleteHuddle</a>
        <a href="https://5starsportsmedia.com">5-Star ↗</a>
      </div>
    </div>
  </div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
  const SUPABASE_URL = "https://urwnbskrtoplgnkkxuvl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_NnATRFU2t1ATOHR07mFLoQ_ptkdjGDT";
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  const root = document.getElementById("root");

  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));

  function htWt(inches, lbs){
    const parts = [];
    if (inches){ const f = Math.floor(inches/12), i = Math.round(inches%12); parts.push(`${f}'${i}"`); }
    if (lbs) parts.push(`${Math.round(lbs)} lb`);
    return parts;
  }

  function privateState(){
    root.innerHTML = `
      <div class="state">
        <div class="eyebrow">★ 5-Star Sports Media</div>
        <h2>This profile is private</h2>
        <p>This athlete's profile isn't public, or the link is no longer active. Families control their own visibility — only the parent can make a profile public.</p>
        <a class="cta" href="players.html">Browse public athletes</a>
      </div>`;
    document.title = "Profile unavailable — 5-Star Sports Media";
  }

  function render(a){
    const name = `${a.first_name || ""} ${a.last_name || ""}`.trim() || "Athlete";
    const initials = ((a.first_name||" ")[0] + (a.last_name||" ")[0]).toUpperCase();
    document.title = `${name} — 5-Star Sports Media`;

    const photo = a.profile_photo_url
      ? `<img src="${esc(a.profile_photo_url)}" alt="${esc(name)}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML='<div class=&quot;monogram&quot;>${esc(initials)}</div>'">`
      : `<div class="monogram">${esc(initials)}</div>`;

    const loc = [a.city, a.state].filter(Boolean).join(", ");
    const metaBits = [];
    if (a.school) metaBits.push(`<b>${esc(a.school)}</b>`);
    if (loc) metaBits.push(esc(loc));

    // stat strip cells
    const cells = [];
    if (a.graduation_year) cells.push(["Class of", `'${String(a.graduation_year).slice(-2)}`]);
    const hw = htWt(a.height_inches, a.weight_lbs);
    if (hw[0]) cells.push(["Height", hw[0]]);
    if (hw[1]) cells.push(["Weight", hw[1]]);
    const hand = a.dominant_hand ? `${a.dominant_hand[0].toUpperCase()}${a.dominant_hand.slice(1)}` : null;
    if (hand) cells.push(["Throws / Shoots", hand]);
    if (a.dominant_foot) cells.push(["Foot", `${a.dominant_foot[0].toUpperCase()}${a.dominant_foot.slice(1)}`]);
    const strip = cells.length ? `<div class="strip">${cells.map(c=>
      `<div class="cell"><div class="k">${esc(c[0])}</div><div class="v">${esc(c[1])}</div></div>`).join("")}</div>` : "";

    // sport tags
    const allSports = [];
    if (a.primary_sport) allSports.push({ name:a.primary_sport, primary:true });
    (a.secondary_sports || []).forEach(s => { if (s) allSports.push({ name:s, primary:false }); });
    const tags = allSports.length ? `<section class="block"><div class="block-title"><span class="star">★</span> Sports</div>
      <div class="tags">${allSports.map(s=>`<span class="tag${s.primary?" primary":""}">${esc(s.name)}</span>`).join("")}</div></section>` : "";

    // teams / positions
    const teams = (a.sports || []).filter(s => s.sport || s.current_team || s.position);
    const teamsHtml = teams.length ? `<section class="block"><div class="block-title"><span class="star">★</span> Teams &amp; Positions</div>
      <div class="teams">${teams.map(s=>{
        const sub = [s.position, s.organization, s.season].filter(Boolean).map(esc).join(" · ");
        return `<div class="team">
          ${s.sport?`<div class="t-sport">${esc(s.sport)}</div>`:""}
          <div class="t-name">${esc(s.current_team || s.position || s.sport || "Team")}</div>
          ${sub?`<div class="t-sub">${sub}</div>`:""}
        </div>`;
      }).join("")}</div></section>` : "";

    // stats
    const stats = (a.stats || []).filter(s => s.stat_name);
    const statsHtml = stats.length ? `<section class="block"><div class="block-title"><span class="star">★</span> Stats</div>
      <div class="stats">${stats.map(s=>`<div class="stat">
        <div class="s-v">${esc(s.stat_value ?? "—")}</div>
        <div class="s-k">${esc(s.stat_name)}</div>
        ${s.season?`<div class="s-season">${esc(s.season)}</div>`:""}
      </div>`).join("")}</div></section>` : "";

    root.innerHTML = `
      <div class="card">
        <div class="hero">
          <div class="photo">${photo}</div>
          <div class="heading">
            ${a.primary_sport?`<div class="sportline">${esc(a.primary_sport)}</div>`:""}
            <h1 class="name">${esc(name)}</h1>
            ${metaBits.length?`<div class="meta">${metaBits.join(" · ")}</div>`:""}
          </div>
        </div>
        ${strip}
        ${tags}
        ${teamsHtml}
        ${statsHtml}
        <div class="verified"><span class="dot"></span> Verified family profile · Powered by AthleteHuddle</div>
      </div>`;
  }

  (async () => {
    const id = new URLSearchParams(location.search).get("id");
    if (!id){ privateState(); return; }
    try {
      const { data, error } = await sb.rpc("public_athlete_card", { p_athlete_id: id });
      if (error) throw error;
      if (!data){ privateState(); return; }
      render(data);
    } catch (e){
      privateState();
    }
  })();
</script>
</body>
</html>
