<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Athletes | 5-Star Sports Media</title>
<meta name="description" content="Browse Western New York's 5-Star athletes — player profiles shared by their families." />
<meta property="og:title" content="Athletes | 5-Star Sports Media" />
<meta property="og:type" content="website" />
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="shared/shared.css">
<style>
  /* Directory styles — pd- prefixed so they never collide with the site stylesheet. */
  .pd-controls{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
  .pd-chip{font-family:var(--font-headline);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-light);border:1px solid var(--dark-border);border-radius:999px;padding:.45rem .95rem;cursor:pointer;background:transparent;transition:all .15s}
  .pd-chip:hover{border-color:var(--gold);color:var(--white)}
  .pd-chip.active{color:var(--black);background:var(--gold);border-color:var(--gold)}

  .pd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.1rem}
  .pd-card{display:block;background:var(--dark-card);border:1px solid var(--dark-border);border-radius:10px;overflow:hidden;transition:transform .15s,border-color .15s;color:inherit}
  .pd-card:hover{transform:translateY(-3px);border-color:var(--gold)}
  .pd-photo{aspect-ratio:4/5;background:linear-gradient(160deg,#191919,#0e0e0e);overflow:hidden;position:relative}
  .pd-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .pd-mono{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:3.4rem;color:var(--gold-dark)}
  .pd-sportbadge{position:absolute;top:.6rem;left:.6rem;font-family:var(--font-headline);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--black);background:var(--gold);padding:.25rem .55rem;border-radius:4px}
  .pd-body{padding:.9rem 1rem 1.1rem}
  .pd-name{font-family:var(--font-headline);font-weight:700;font-size:1.05rem;color:var(--white);line-height:1.1}
  .pd-meta{font-size:.78rem;color:var(--gray-light);opacity:.85;margin-top:.25rem;line-height:1.4}
  .pd-view{font-family:var(--font-headline);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-top:.6rem}

  .pd-empty{text-align:center;padding:3.5rem 1.25rem;color:var(--gray-light)}
  .pd-empty h2{font-family:var(--font-display);font-size:2rem;color:var(--white);margin-bottom:.5rem}
  .pd-empty p{max-width:440px;margin:0 auto;font-size:.95rem;line-height:1.7}
  .pd-skel{color:var(--gray);font-family:var(--font-headline);letter-spacing:.12em;text-transform:uppercase;font-size:.72rem;padding:3rem 0;text-align:center}
  .pd-count{font-size:.78rem;color:var(--gray);margin-bottom:1rem;font-family:var(--font-headline);letter-spacing:.06em;text-transform:uppercase}
</style>
</head>
<body>
<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <span class="section-label">Western New York</span>
    <div class="gold-line"></div>
    <h1>Athletes</h1>
    <p>Player profiles shared by their families. Tap any athlete to see their card.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div id="dir"><div class="pd-skel">Loading athletes…</div></div>
  </div>
</section>

<div id="sponsor-banner"></div>
<div id="site-footer"></div>

<script src="shared/config.js"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/auth.js"></script>
<script src="shared/lead-capture.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/analytics.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/loaders.js"></script>
<script src="assets/js/main.js"></script>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
  const SUPABASE_URL = "https://urwnbskrtoplgnkkxuvl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_NnATRFU2t1ATOHR07mFLoQ_ptkdjGDT";
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  const dir = document.getElementById("dir");

  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));

  let athletes = [];
  let activeSport = "__all";

  function tile(a){
    const name = `${a.first_name||""} ${a.last_name||""}`.trim() || "Athlete";
    const initials = ((a.first_name||" ")[0] + (a.last_name||" ")[0]).toUpperCase();
    const meta = [a.graduation_year?`Class of ${a.graduation_year}`:null, a.school, [a.city,a.state].filter(Boolean).join(", ")]
      .filter(Boolean).map(esc).join(" · ");
    const photo = a.profile_photo_url
      ? `<img src="${esc(a.profile_photo_url)}" alt="${esc(name)}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML='<div class=&quot;pd-mono&quot;>${esc(initials)}</div>'">`
      : `<div class="pd-mono">${esc(initials)}</div>`;
    const badge = a.primary_sport ? `<div class="pd-sportbadge">${esc(a.primary_sport)}</div>` : "";
    return `<a class="pd-card" href="player-card.html?id=${encodeURIComponent(a.id)}" data-sport="${esc((a.primary_sport||"").toLowerCase())}">
      <div class="pd-photo">${photo}${badge}</div>
      <div class="pd-body">
        <div class="pd-name">${esc(name)}</div>
        ${meta?`<div class="pd-meta">${meta}</div>`:""}
        <div class="pd-view">View card →</div>
      </div>
    </a>`;
  }

  function render(){
    const list = activeSport === "__all"
      ? athletes
      : athletes.filter(a => (a.primary_sport||"").toLowerCase() === activeSport);

    if (!athletes.length){
      dir.innerHTML = `<div class="pd-empty">
        <h2>No athletes yet</h2>
        <p>When Western New York families publish their player cards, they'll show up here. Check back soon.</p>
      </div>`;
      return;
    }

    const sports = [...new Set(athletes.map(a => a.primary_sport).filter(Boolean))]
      .sort((x,y)=>x.localeCompare(y));
    const chips = `<button class="pd-chip${activeSport==="__all"?" active":""}" data-s="__all">All</button>` +
      sports.map(s=>`<button class="pd-chip${activeSport===s.toLowerCase()?" active":""}" data-s="${esc(s.toLowerCase())}">${esc(s)}</button>`).join("");

    dir.innerHTML = `
      <div class="pd-controls" id="pdChips">${chips}</div>
      <div class="pd-count">${list.length} athlete${list.length===1?"":"s"}</div>
      <div class="pd-grid">${list.map(tile).join("")}</div>`;

    document.querySelectorAll("#pdChips .pd-chip").forEach(btn =>
      btn.addEventListener("click", () => { activeSport = btn.getAttribute("data-s"); render(); }));
  }

  (async () => {
    try{
      const { data, error } = await sb.rpc("public_athlete_directory");
      if (error) throw error;
      athletes = data || [];
      render();
    }catch(e){
      dir.innerHTML = `<div class="pd-empty"><h2>Couldn't load athletes</h2>
        <p>Please refresh the page in a moment.</p></div>`;
    }
  })();
</script>
</body>
</html>
